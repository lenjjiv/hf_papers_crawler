version: '3.8'

services:
  mongo:
    image: mongodb/mongodb-community-server:7.0.28-ubi8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - crawler_network
    environment:
      - MONGO_INITDB_DATABASE=huggingface_papers

  crawler:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=huggingface_papers
    depends_on:
      - mongo
    networks:
      - crawler_network

networks:
  crawler_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
